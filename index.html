<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="code.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
              <div class="display-header">
                <div id="display-header-box"></div>
                <div id="solar-panel">
                    <div class="solar-panel-comp"></div>
                    <div class="solar-panel-comp"></div>
                    <div class="solar-panel-comp"></div>
                    <div class="solar-panel-comp"></div>
                    <div class="solar-panel-comp"></div>
                    <div class="solar-panel-comp"></div>
                </div>
              </div>
              <div id="screen">
                <output type="text" id="screen-output">0</output>
              </div>
            </div>
            <div class="all-buttons">
              <div>
                <button class="operator-b" id="all-clear">AC</button>
                <button class="operator-b">C</button>
              </div>
              <button class="operator" id="remainder">&#37</button>
              <button class="digits">7</button>
              <button class="digits">8</button>
              <button class="digits">9</button>
              <button class="operator" id="divide">&#247</button>
              <button class="digits">4</button>
              <button class="digits">5</button>
              <button class="digits">6</button>
              <button class="operator" id="multiply">&#215</button>
              <button class="digits">1</button>
              <button class="digits">2</button>
              <button class="digits">3</button>
              <button class="operator" id="minus">&#45</button>
              <button class="digits">0</button>
              <button class="digits">.</button>
              <button class="operator-b">=</button>
              <button class="operator">+</button>
            </div>
        </div>
    </div>
</body>
</html>
